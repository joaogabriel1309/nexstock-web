<mat-sidenav-container class="container">
  
  <mat-sidenav #sidenav [opened]="menuAberto" mode="side" class="sidenav">
    <div class="sidenav-logo">
      <div class="logo-wrapper">
        <mat-icon>inventory_2</mat-icon>
      </div>
      <span>NexStock</span>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of menuItems; track item.rota) {
        <a mat-list-item
           [routerLink]="item.rota"
           routerLinkActive="active-link"
           class="menu-item">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="conteudo">
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" class="menu-toggle">
        <mat-icon>menu</mat-icon>
      </button>
      
      <span class="spacer"></span>

      <div class="user-info">
        <span class="user-label">{{ tokenService.getUsuario()?.nome }}</span>
        <button mat-icon-button [matMenuTriggerFor]="menuUsuario" class="user-btn">
          <mat-icon>account_circle</mat-icon>
        </button>
      </div>

      <mat-menu #menuUsuario="matMenu" class="custom-user-menu">
        <div class="menu-header-info">
          <strong>{{ tokenService.getUsuario()?.nome }}</strong>
          <small>Acesso Sistema</small>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="sair()">
          <mat-icon>logout</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="pagina">
      <div class="router-container">
        <router-outlet></router-outlet>
      </div>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
