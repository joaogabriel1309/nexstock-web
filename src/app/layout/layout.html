<mat-sidenav-container class="container">

  <mat-sidenav #sidenav [opened]="menuAberto" mode="side" class="sidenav">
    <div class="sidenav-logo">
      <mat-icon>inventory_2</mat-icon>
      <span>NexStock</span>
    </div>

    <mat-nav-list>
      @for (item of menuItems; track item.rota) {
        <a mat-list-item
           [routerLink]="item.rota"
           routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="conteudo">
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="spacer"></span>
      <button mat-icon-button [matMenuTriggerFor]="menuUsuario">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #menuUsuario="matMenu">
        <button mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ tokenService.getUsuario()?.nome }}</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="sair()">
          <mat-icon>logout</mat-icon>
          <span>Sair</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="pagina">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>

</mat-sidenav-container>
